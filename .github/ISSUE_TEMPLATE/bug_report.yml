name: Bug report
description: Report a reproducible problem in Add a Line.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Please remove private note content, file paths, and image URLs before submitting."
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "1.6.0"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and Mac model
      placeholder: "macOS 15.5, Apple Silicon"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
